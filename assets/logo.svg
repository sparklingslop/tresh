<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Deep dark background with subtle color shift -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080012"/>
      <stop offset="50%" stop-color="#050810"/>
      <stop offset="100%" stop-color="#0a0014"/>
    </linearGradient>

    <!-- Neon green for primary strokes -->
    <linearGradient id="neon-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#00FF66"/>
    </linearGradient>

    <!-- Neon cyan for mesh lines -->
    <linearGradient id="neon-cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>

    <!-- Neon pink for accents -->
    <linearGradient id="neon-pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF00FF"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>

    <!-- Tri-color text gradient -->
    <linearGradient id="text-grad" x1="180" y1="0" x2="844" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00FFFF"/>
      <stop offset="35%" stop-color="#39FF14"/>
      <stop offset="70%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>

    <!-- Strong neon glow -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feColorMatrix in="b" type="saturate" values="2" result="sat"/>
      <feMerge>
        <feMergeNode in="sat"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan line glow -->
    <filter id="cyan-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pink glow -->
    <filter id="pink-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="text-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- macOS squircle -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Ambient color wash -->
    <rect width="1024" height="1024" fill="rgba(0,255,255,0.02)"/>
    <rect x="0" y="512" width="1024" height="512" fill="rgba(255,0,255,0.015)"/>
  </g>

  <!-- Background mesh grid (very subtle, fills the space) -->
  <g clip-path="url(#squircle)" stroke="#00FFFF" stroke-opacity="0.04" stroke-width="1" fill="none">
    <line x1="170" y1="160" x2="854" y2="160"/>
    <line x1="170" y1="360" x2="854" y2="360"/>
    <line x1="170" y1="560" x2="854" y2="560"/>
    <line x1="170" y1="760" x2="854" y2="760"/>
    <line x1="170" y1="160" x2="170" y2="760"/>
    <line x1="380" y1="160" x2="380" y2="760"/>
    <line x1="644" y1="160" x2="644" y2="760"/>
    <line x1="854" y1="160" x2="854" y2="760"/>
  </g>

  <!-- CYAN mesh connection lines -->
  <g clip-path="url(#squircle)">
    <g filter="url(#cyan-glow)" stroke="#00FFFF" fill="none">
      <!-- Primary mesh edges -->
      <line x1="280" y1="250" x2="744" y2="250" stroke-width="2" stroke-opacity="0.5"/>
      <line x1="280" y1="250" x2="512" y2="450" stroke-width="2" stroke-opacity="0.4"/>
      <line x1="744" y1="250" x2="512" y2="450" stroke-width="2" stroke-opacity="0.4"/>
      <line x1="512" y1="450" x2="280" y2="650" stroke-width="2" stroke-opacity="0.4"/>
      <line x1="512" y1="450" x2="744" y2="650" stroke-width="2" stroke-opacity="0.4"/>
      <line x1="280" y1="650" x2="744" y2="650" stroke-width="2" stroke-opacity="0.5"/>
      <!-- Vertical edges -->
      <line x1="280" y1="250" x2="280" y2="650" stroke-width="1.5" stroke-opacity="0.2"/>
      <line x1="744" y1="250" x2="744" y2="650" stroke-width="1.5" stroke-opacity="0.2"/>
      <!-- Cross diagonal -->
      <line x1="280" y1="650" x2="744" y2="250" stroke-width="1" stroke-opacity="0.12"/>
    </g>
  </g>

  <!-- NEON GREEN pane nodes -->
  <g clip-path="url(#squircle)">
    <g filter="url(#glow)">

      <!-- Top-left: neon green pane -->
      <g transform="translate(280, 250)">
        <rect x="-48" y="-36" width="96" height="72" rx="6"
              fill="rgba(57,255,20,0.04)" stroke="#39FF14" stroke-width="2.5"/>
        <line x1="0" y1="-36" x2="0" y2="36" stroke="#39FF14" stroke-width="1" stroke-opacity="0.3"/>
        <!-- Terminal text -->
        <rect x="-36" y="-22" width="5" height="3" fill="#39FF14" fill-opacity="1"/>
        <rect x="-28" y="-22" width="18" height="3" fill="#39FF14" fill-opacity="0.7"/>
        <rect x="-36" y="-14" width="14" height="2.5" fill="#39FF14" fill-opacity="0.4"/>
        <rect x="8" y="-22" width="24" height="2" fill="#39FF14" fill-opacity="0.35"/>
        <rect x="8" y="-16" width="16" height="2" fill="#39FF14" fill-opacity="0.25"/>
        <rect x="8" y="-10" width="20" height="2" fill="#39FF14" fill-opacity="0.2"/>
      </g>

      <!-- Top-right: neon cyan pane -->
      <g transform="translate(744, 250)">
        <rect x="-48" y="-36" width="96" height="72" rx="6"
              fill="rgba(0,255,255,0.04)" stroke="#00FFFF" stroke-width="2.5"/>
        <line x1="-48" y1="0" x2="48" y2="0" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.3"/>
        <rect x="-36" y="-24" width="28" height="2.5" fill="#00FFFF" fill-opacity="0.6"/>
        <rect x="-36" y="-18" width="18" height="2" fill="#00FFFF" fill-opacity="0.35"/>
        <rect x="-36" y="8" width="22" height="2.5" fill="#00FFFF" fill-opacity="0.5"/>
        <rect x="-36" y="14" width="14" height="2" fill="#00FFFF" fill-opacity="0.3"/>
      </g>

      <!-- Center hub: tri-color gradient pane (the star) -->
      <g transform="translate(512, 450)">
        <rect x="-58" y="-44" width="116" height="88" rx="8"
              fill="rgba(57,255,20,0.06)" stroke="#39FF14" stroke-width="3"/>
        <!-- Secondary stroke for depth -->
        <rect x="-58" y="-44" width="116" height="88" rx="8"
              fill="none" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.3"/>
        <!-- Pane dividers -->
        <line x1="-58" y1="-8" x2="58" y2="-8" stroke="#39FF14" stroke-width="1" stroke-opacity="0.4"/>
        <line x1="0" y1="-8" x2="0" y2="44" stroke="#39FF14" stroke-width="1" stroke-opacity="0.4"/>
        <!-- Top: active prompt (green) -->
        <rect x="-44" y="-34" width="6" height="3.5" fill="#39FF14"/>
        <rect x="-34" y="-34" width="34" height="3.5" fill="#39FF14" fill-opacity="0.7"/>
        <rect x="-44" y="-26" width="24" height="3" fill="#39FF14" fill-opacity="0.45"/>
        <rect x="-44" y="-18" width="18" height="2.5" fill="#39FF14" fill-opacity="0.3"/>
        <!-- Bottom-left: cyan text -->
        <rect x="-44" y="2" width="20" height="2.5" fill="#00FFFF" fill-opacity="0.5"/>
        <rect x="-44" y="8" width="14" height="2" fill="#00FFFF" fill-opacity="0.35"/>
        <rect x="-44" y="14" width="22" height="2" fill="#00FFFF" fill-opacity="0.25"/>
        <!-- Bottom-right: pink text -->
        <rect x="10" y="2" width="18" height="2.5" fill="#FF00FF" fill-opacity="0.5"/>
        <rect x="10" y="8" width="24" height="2" fill="#FF00FF" fill-opacity="0.35"/>
        <rect x="10" y="14" width="14" height="2" fill="#FF00FF" fill-opacity="0.25"/>
      </g>

      <!-- Bottom-left: neon pink pane -->
      <g transform="translate(280, 650)">
        <rect x="-48" y="-36" width="96" height="72" rx="6"
              fill="rgba(255,0,255,0.04)" stroke="#FF00FF" stroke-width="2.5"/>
        <rect x="-36" y="-20" width="30" height="2.5" fill="#FF00FF" fill-opacity="0.5"/>
        <rect x="-36" y="-14" width="20" height="2" fill="#FF00FF" fill-opacity="0.35"/>
        <rect x="-36" y="-8" width="24" height="2" fill="#FF00FF" fill-opacity="0.25"/>
        <rect x="-36" y="-2" width="14" height="2" fill="#FF00FF" fill-opacity="0.2"/>
        <!-- Blinking cursor -->
        <rect x="-36" y="6" width="8" height="3.5" fill="#FF00FF" fill-opacity="0.9"/>
      </g>

      <!-- Bottom-right: mixed cyan/green pane -->
      <g transform="translate(744, 650)">
        <rect x="-48" y="-36" width="96" height="72" rx="6"
              fill="rgba(0,255,255,0.03)" stroke="#00FFFF" stroke-width="2" stroke-opacity="0.7"/>
        <line x1="0" y1="-36" x2="0" y2="36" stroke="#00FFFF" stroke-width="1" stroke-opacity="0.25"/>
        <rect x="-36" y="-18" width="22" height="2" fill="#39FF14" fill-opacity="0.4"/>
        <rect x="-36" y="-12" width="16" height="2" fill="#39FF14" fill-opacity="0.3"/>
        <rect x="8" y="-18" width="20" height="2" fill="#00FFFF" fill-opacity="0.35"/>
        <rect x="8" y="-12" width="28" height="2" fill="#00FFFF" fill-opacity="0.25"/>
        <rect x="8" y="-6" width="14" height="2" fill="#00FFFF" fill-opacity="0.18"/>
      </g>
    </g>
  </g>

  <!-- Signal pulses: multi-color data in transit -->
  <g clip-path="url(#squircle)">
    <g filter="url(#pink-glow)">
      <!-- Pink pulse traveling top-left to center -->
      <circle cx="380" cy="340" r="5" fill="#FF00FF" fill-opacity="0.95"/>
      <!-- Cyan pulse on top edge -->
      <circle cx="520" cy="250" r="4.5" fill="#00FFFF" fill-opacity="0.9"/>
      <!-- Green pulse center to bottom-right -->
      <circle cx="640" cy="560" r="4" fill="#39FF14" fill-opacity="0.85"/>
      <!-- Pink pulse on bottom edge -->
      <circle cx="440" cy="650" r="3.5" fill="#FF00FF" fill-opacity="0.7"/>
      <!-- Cyan pulse left vertical -->
      <circle cx="280" cy="420" r="3" fill="#00FFFF" fill-opacity="0.6"/>
      <!-- Green pulse right diagonal -->
      <circle cx="744" cy="380" r="3" fill="#39FF14" fill-opacity="0.5"/>
    </g>
  </g>

  <!-- Wordmark: tmesh in monospace -->
  <g clip-path="url(#squircle)">
    <text x="512" y="855" text-anchor="middle"
          font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace"
          font-weight="700" font-size="92"
          letter-spacing="14" fill="url(#text-grad)" filter="url(#text-glow)">tmesh</text>
  </g>
</svg>

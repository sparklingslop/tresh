<svg xmlns="http://www.w3.org/2000/svg" viewBox="10 10 460 185" width="460" height="185">
  <!-- tresh logo: t[r/m]esh + trash can with I/O -->
  <!-- Composition centered: text block + trash can + subtitles -->

  <g fill="#e8e8e8" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas','Courier New',monospace">

    <!-- t -->
    <text x="40" y="128" font-size="72" font-weight="700" letter-spacing="4">t</text>

    <!-- m (dimmed, struck through) -->
    <text x="100" y="128" font-size="72" font-weight="700" letter-spacing="4" opacity="0.2">m</text>
    <line x1="98" y1="112" x2="154" y2="112" stroke="#ff2d8a" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

    <!-- r (neon pink, above m) -->
    <text x="102" y="62" font-size="68" font-weight="700" fill="#ff2d8a">r</text>
    <!-- caret -->
    <path d="M128 70 L121 83 L114 70" fill="none" stroke="#ff2d8a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

    <!-- esh -->
    <text x="162" y="128" font-size="72" font-weight="700" letter-spacing="4">esh</text>

  </g>

  <!-- Mini trash can with I/O signals — more gap from text -->
  <g transform="translate(345, 82)">
    <!-- incoming signals (left) — arcs curve away from can, arrow points in -->
    <path d="M-6 10 Q-10 18 -6 26" fill="none" stroke="#ff2d8a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M-12 6 Q-18 18 -12 30" fill="none" stroke="#ff2d8a" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <path d="M-18 2 Q-26 18 -18 34" fill="none" stroke="#ff2d8a" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    <!-- arrow pointing right (into can) -->
    <path d="M-2 15 L4 18 L-2 21" fill="none" stroke="#ff2d8a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

    <!-- trash can -->
    <g fill="none" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
      <line x1="4" y1="6" x2="36" y2="6"/>
      <path d="M13 6 L13 2 Q13 -2 17 -2 L23 -2 Q27 -2 27 2 L27 6"/>
      <line x1="0" y1="10" x2="40" y2="10"/>
      <path d="M4 10 L6 42 Q6.5 45 10 45 L30 45 Q33.5 45 34 42 L36 10"/>
      <line x1="15" y1="15" x2="15.5" y2="40" stroke-width="1" opacity="0.25"/>
      <line x1="20" y1="15" x2="20" y2="40" stroke-width="1" opacity="0.25"/>
      <line x1="25" y1="15" x2="24.5" y2="40" stroke-width="1" opacity="0.25"/>
    </g>
    <!-- cursor inside -->
    <rect x="17" y="20" width="6" height="10" fill="#e8e8e8" opacity="0.4" rx="0.5"/>

    <!-- outgoing signals (right) — mirror of left -->
    <path d="M46 10 Q50 18 46 26" fill="none" stroke="#ff2d8a" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M52 6 Q58 18 52 30" fill="none" stroke="#ff2d8a" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
    <path d="M58 2 Q66 18 58 34" fill="none" stroke="#ff2d8a" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
    <!-- arrow pointing right (out of can) -->
    <path d="M42 15 L36 18 L42 21" fill="none" stroke="#ff2d8a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- Acronym — centered on composition -->
  <text x="240" y="162" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9.5" fill="#e8e8e8" opacity="0.4" letter-spacing="2.5">TRIVIALLY RELIABLE EVENT SHUTTLE FOR HARNESSES</text>

  <!-- Trash pun tagline -->
  <text x="230" y="180" text-anchor="middle" font-family="'SF Mono','Fira Code','Consolas',monospace" font-size="9" fill="#ff2d8a" opacity="0.4" letter-spacing="1.5" font-style="italic">where communication is properly disposed of</text>

</svg>

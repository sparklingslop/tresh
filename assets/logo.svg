<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Dark terminal background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f14"/>
      <stop offset="100%" stop-color="#060a0e"/>
    </linearGradient>

    <!-- Terminal green gradient (matrix/phosphor aesthetic) -->
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="50%" stop-color="#00cc66"/>
      <stop offset="100%" stop-color="#00ff88"/>
    </linearGradient>

    <!-- Dim green for mesh lines -->
    <linearGradient id="mesh-line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff8855"/>
      <stop offset="100%" stop-color="#00cc6644"/>
    </linearGradient>

    <!-- Node glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle line glow -->
    <filter id="line-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text glow -->
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text gradient -->
    <linearGradient id="tg" x1="200" y1="0" x2="824" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>

    <!-- macOS squircle -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="228"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <!-- Subtle green tint overlay -->
    <rect width="1024" height="1024" fill="rgba(0,255,136,0.015)"/>
  </g>

  <!-- Mesh connection lines (behind nodes) -->
  <g clip-path="url(#squircle)">
    <g filter="url(#line-glow)" stroke="#00ff88" stroke-opacity="0.25" stroke-width="2.5" fill="none">
      <!-- Top-left to top-right -->
      <line x1="280" y1="260" x2="744" y2="260"/>
      <!-- Top-left to center -->
      <line x1="280" y1="260" x2="512" y2="460"/>
      <!-- Top-right to center -->
      <line x1="744" y1="260" x2="512" y2="460"/>
      <!-- Center to bottom-left -->
      <line x1="512" y1="460" x2="280" y2="660"/>
      <!-- Center to bottom-right -->
      <line x1="512" y1="460" x2="744" y2="660"/>
      <!-- Bottom-left to bottom-right -->
      <line x1="280" y1="660" x2="744" y2="660"/>
      <!-- Cross diagonals for mesh density -->
      <line x1="280" y1="260" x2="280" y2="660" stroke-opacity="0.12"/>
      <line x1="744" y1="260" x2="744" y2="660" stroke-opacity="0.12"/>
      <line x1="280" y1="660" x2="744" y2="260" stroke-opacity="0.08"/>
    </g>
  </g>

  <!-- Tmux pane nodes (4 outer + 1 center) -->
  <g clip-path="url(#squircle)">
    <g filter="url(#glow)">
      <!-- Top-left pane node -->
      <g transform="translate(280, 260)">
        <rect x="-42" y="-32" width="84" height="64" rx="6"
              fill="none" stroke="#00ff88" stroke-width="2.5" stroke-opacity="0.8"/>
        <!-- Pane divider (vertical) -->
        <line x1="0" y1="-32" x2="0" y2="32" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.3"/>
        <!-- Cursor blink in left pane -->
        <rect x="-30" y="-8" width="16" height="3" fill="#00ff88" fill-opacity="0.9"/>
        <rect x="-30" y="-1" width="10" height="3" fill="#00ff88" fill-opacity="0.5"/>
        <!-- Text lines in right pane -->
        <rect x="8" y="-8" width="22" height="2" fill="#00ff88" fill-opacity="0.4"/>
        <rect x="8" y="-2" width="16" height="2" fill="#00ff88" fill-opacity="0.3"/>
        <rect x="8" y="4" width="20" height="2" fill="#00ff88" fill-opacity="0.2"/>
      </g>

      <!-- Top-right pane node -->
      <g transform="translate(744, 260)">
        <rect x="-42" y="-32" width="84" height="64" rx="6"
              fill="none" stroke="#00ff88" stroke-width="2.5" stroke-opacity="0.8"/>
        <!-- Pane divider (horizontal) -->
        <line x1="-42" y1="0" x2="42" y2="0" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.3"/>
        <!-- Top pane content -->
        <rect x="-30" y="-20" width="24" height="2" fill="#00ff88" fill-opacity="0.5"/>
        <rect x="-30" y="-14" width="18" height="2" fill="#00ff88" fill-opacity="0.3"/>
        <!-- Bottom pane content -->
        <rect x="-30" y="8" width="20" height="2" fill="#00ff88" fill-opacity="0.4"/>
        <rect x="-30" y="14" width="14" height="2" fill="#00ff88" fill-opacity="0.25"/>
      </g>

      <!-- Center node (the hub / active agent) - larger, brighter -->
      <g transform="translate(512, 460)">
        <rect x="-52" y="-40" width="104" height="80" rx="8"
              fill="rgba(0,255,136,0.06)" stroke="#00ff88" stroke-width="3" stroke-opacity="1"/>
        <!-- Three-pane layout -->
        <line x1="-52" y1="-8" x2="52" y2="-8" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4"/>
        <line x1="0" y1="-8" x2="0" y2="40" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.4"/>
        <!-- Top pane: command prompt -->
        <rect x="-38" y="-30" width="6" height="3" fill="#00ff88" fill-opacity="0.9"/>
        <rect x="-28" y="-30" width="30" height="3" fill="#00ff88" fill-opacity="0.6"/>
        <rect x="-38" y="-22" width="22" height="3" fill="#00ff88" fill-opacity="0.4"/>
        <!-- Bottom-left pane -->
        <rect x="-38" y="4" width="18" height="2" fill="#00ff88" fill-opacity="0.4"/>
        <rect x="-38" y="10" width="14" height="2" fill="#00ff88" fill-opacity="0.3"/>
        <rect x="-38" y="16" width="20" height="2" fill="#00ff88" fill-opacity="0.2"/>
        <!-- Bottom-right pane -->
        <rect x="10" y="4" width="16" height="2" fill="#00ff88" fill-opacity="0.35"/>
        <rect x="10" y="10" width="22" height="2" fill="#00ff88" fill-opacity="0.25"/>
      </g>

      <!-- Bottom-left pane node -->
      <g transform="translate(280, 660)">
        <rect x="-42" y="-32" width="84" height="64" rx="6"
              fill="none" stroke="#00ff88" stroke-width="2.5" stroke-opacity="0.6"/>
        <!-- Single pane content -->
        <rect x="-30" y="-16" width="26" height="2" fill="#00ff88" fill-opacity="0.4"/>
        <rect x="-30" y="-10" width="18" height="2" fill="#00ff88" fill-opacity="0.3"/>
        <rect x="-30" y="-4" width="22" height="2" fill="#00ff88" fill-opacity="0.25"/>
        <rect x="-30" y="2" width="12" height="2" fill="#00ff88" fill-opacity="0.2"/>
        <!-- Cursor -->
        <rect x="-30" y="10" width="8" height="3" fill="#00ff88" fill-opacity="0.7"/>
      </g>

      <!-- Bottom-right pane node -->
      <g transform="translate(744, 660)">
        <rect x="-42" y="-32" width="84" height="64" rx="6"
              fill="none" stroke="#00ff88" stroke-width="2.5" stroke-opacity="0.6"/>
        <!-- Vertical split -->
        <line x1="0" y1="-32" x2="0" y2="32" stroke="#00ff88" stroke-width="1.2" stroke-opacity="0.3"/>
        <!-- Left pane -->
        <rect x="-30" y="-14" width="20" height="2" fill="#00ff88" fill-opacity="0.35"/>
        <rect x="-30" y="-8" width="14" height="2" fill="#00ff88" fill-opacity="0.25"/>
        <!-- Right pane -->
        <rect x="8" y="-14" width="18" height="2" fill="#00ff88" fill-opacity="0.3"/>
        <rect x="8" y="-8" width="22" height="2" fill="#00ff88" fill-opacity="0.2"/>
        <rect x="8" y="-2" width="12" height="2" fill="#00ff88" fill-opacity="0.15"/>
      </g>
    </g>
  </g>

  <!-- Signal pulse dots on mesh lines (data in transit) -->
  <g clip-path="url(#squircle)">
    <g filter="url(#glow)">
      <!-- Pulse on top line -->
      <circle cx="460" cy="260" r="4" fill="#00ff88" fill-opacity="0.9"/>
      <!-- Pulse on diagonal -->
      <circle cx="396" cy="360" r="3.5" fill="#00ff88" fill-opacity="0.7"/>
      <!-- Pulse on bottom line -->
      <circle cx="580" cy="660" r="3" fill="#00ff88" fill-opacity="0.6"/>
      <!-- Pulse on right diagonal -->
      <circle cx="650" cy="540" r="3" fill="#00ff88" fill-opacity="0.5"/>
    </g>
  </g>

  <!-- Wordmark: tmesh -->
  <g clip-path="url(#squircle)">
    <text x="512" y="850" text-anchor="middle"
          font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
          font-weight="600" font-size="88"
          letter-spacing="12" fill="url(#tg)" filter="url(#text-glow)">tmesh</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f14"/>
      <stop offset="100%" stop-color="#060a0e"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="line-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sq">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <g clip-path="url(#sq)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <rect width="512" height="512" fill="rgba(0,255,136,0.015)"/>
  </g>

  <!-- Mesh lines -->
  <g clip-path="url(#sq)">
    <g filter="url(#line-glow)" stroke="#00ff88" stroke-opacity="0.25" stroke-width="1.5" fill="none">
      <line x1="140" y1="140" x2="372" y2="140"/>
      <line x1="140" y1="140" x2="256" y2="256"/>
      <line x1="372" y1="140" x2="256" y2="256"/>
      <line x1="256" y1="256" x2="140" y2="372"/>
      <line x1="256" y1="256" x2="372" y2="372"/>
      <line x1="140" y1="372" x2="372" y2="372"/>
      <line x1="140" y1="140" x2="140" y2="372" stroke-opacity="0.12"/>
      <line x1="372" y1="140" x2="372" y2="372" stroke-opacity="0.12"/>
    </g>
  </g>

  <!-- Pane nodes -->
  <g clip-path="url(#sq)">
    <g filter="url(#glow)">
      <!-- Top-left -->
      <rect x="116" y="118" width="48" height="44" rx="4"
            fill="none" stroke="#00ff88" stroke-width="1.8" stroke-opacity="0.8"/>
      <rect x="122" y="130" width="12" height="2" fill="#00ff88" fill-opacity="0.6"/>
      <rect x="122" y="135" width="8" height="2" fill="#00ff88" fill-opacity="0.4"/>

      <!-- Top-right -->
      <rect x="348" y="118" width="48" height="44" rx="4"
            fill="none" stroke="#00ff88" stroke-width="1.8" stroke-opacity="0.8"/>
      <rect x="354" y="130" width="14" height="2" fill="#00ff88" fill-opacity="0.5"/>
      <rect x="354" y="135" width="10" height="2" fill="#00ff88" fill-opacity="0.3"/>

      <!-- Center (hub) -->
      <rect x="226" y="226" width="60" height="60" rx="6"
            fill="rgba(0,255,136,0.06)" stroke="#00ff88" stroke-width="2.2" stroke-opacity="1"/>
      <line x1="226" y1="248" x2="286" y2="248" stroke="#00ff88" stroke-width="0.8" stroke-opacity="0.4"/>
      <rect x="234" y="234" width="18" height="2" fill="#00ff88" fill-opacity="0.7"/>
      <rect x="234" y="254" width="12" height="2" fill="#00ff88" fill-opacity="0.4"/>
      <rect x="234" y="260" width="16" height="2" fill="#00ff88" fill-opacity="0.3"/>

      <!-- Bottom-left -->
      <rect x="116" y="350" width="48" height="44" rx="4"
            fill="none" stroke="#00ff88" stroke-width="1.8" stroke-opacity="0.6"/>
      <rect x="122" y="362" width="10" height="2" fill="#00ff88" fill-opacity="0.4"/>
      <rect x="122" y="368" width="6" height="2" fill="#00ff88" fill-opacity="0.6"/>

      <!-- Bottom-right -->
      <rect x="348" y="350" width="48" height="44" rx="4"
            fill="none" stroke="#00ff88" stroke-width="1.8" stroke-opacity="0.6"/>
      <rect x="354" y="362" width="16" height="2" fill="#00ff88" fill-opacity="0.35"/>
      <rect x="354" y="368" width="10" height="2" fill="#00ff88" fill-opacity="0.25"/>
    </g>
  </g>

  <!-- Signal pulses -->
  <g clip-path="url(#sq)">
    <g filter="url(#glow)">
      <circle cx="230" cy="140" r="2.5" fill="#00ff88" fill-opacity="0.9"/>
      <circle cx="198" cy="198" r="2" fill="#00ff88" fill-opacity="0.7"/>
      <circle cx="320" cy="320" r="2" fill="#00ff88" fill-opacity="0.6"/>
    </g>
  </g>
</svg>

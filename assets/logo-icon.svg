<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0C0015"/>
      <stop offset="100%" stop-color="#06000D"/>
    </linearGradient>

    <linearGradient id="bt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/><stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="bm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/><stop offset="100%" stop-color="#9333EA"/>
    </linearGradient>
    <linearGradient id="be" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6EC7"/><stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="bs" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#84CC16"/><stop offset="100%" stop-color="#65A30D"/>
    </linearGradient>
    <linearGradient id="bh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="sq">
      <rect width="512" height="512" rx="114"/>
    </clipPath>
  </defs>

  <g clip-path="url(#sq)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Dot grid -->
    <g opacity="0.06" fill="#A855F7">
      <circle cx="64" cy="64" r="1.5"/><circle cx="128" cy="64" r="1.5"/><circle cx="192" cy="64" r="1.5"/><circle cx="256" cy="64" r="1.5"/><circle cx="320" cy="64" r="1.5"/><circle cx="384" cy="64" r="1.5"/><circle cx="448" cy="64" r="1.5"/>
      <circle cx="64" cy="128" r="1.5"/><circle cx="128" cy="128" r="1.5"/><circle cx="192" cy="128" r="1.5"/><circle cx="256" cy="128" r="1.5"/><circle cx="320" cy="128" r="1.5"/><circle cx="384" cy="128" r="1.5"/><circle cx="448" cy="128" r="1.5"/>
      <circle cx="64" cy="192" r="1.5"/><circle cx="128" cy="192" r="1.5"/><circle cx="192" cy="192" r="1.5"/><circle cx="256" cy="192" r="1.5"/><circle cx="320" cy="192" r="1.5"/><circle cx="384" cy="192" r="1.5"/><circle cx="448" cy="192" r="1.5"/>
      <circle cx="64" cy="256" r="1.5"/><circle cx="128" cy="256" r="1.5"/><circle cx="192" cy="256" r="1.5"/><circle cx="256" cy="256" r="1.5"/><circle cx="320" cy="256" r="1.5"/><circle cx="384" cy="256" r="1.5"/><circle cx="448" cy="256" r="1.5"/>
      <circle cx="64" cy="320" r="1.5"/><circle cx="128" cy="320" r="1.5"/><circle cx="192" cy="320" r="1.5"/><circle cx="256" cy="320" r="1.5"/><circle cx="320" cy="320" r="1.5"/><circle cx="384" cy="320" r="1.5"/><circle cx="448" cy="320" r="1.5"/>
      <circle cx="64" cy="384" r="1.5"/><circle cx="128" cy="384" r="1.5"/><circle cx="192" cy="384" r="1.5"/><circle cx="256" cy="384" r="1.5"/><circle cx="320" cy="384" r="1.5"/><circle cx="384" cy="384" r="1.5"/><circle cx="448" cy="384" r="1.5"/>
      <circle cx="64" cy="448" r="1.5"/><circle cx="128" cy="448" r="1.5"/><circle cx="192" cy="448" r="1.5"/><circle cx="256" cy="448" r="1.5"/><circle cx="320" cy="448" r="1.5"/><circle cx="384" cy="448" r="1.5"/><circle cx="448" cy="448" r="1.5"/>
    </g>

    <!-- Mesh lines behind blocks -->
    <g opacity="0.2" stroke-dasharray="4,4" stroke-width="1">
      <line x1="256" y1="70" x2="256" y2="440" stroke="#A855F7"/>
      <line x1="190" y1="112" x2="310" y2="192" stroke="#22D3EE"/>
      <line x1="310" y1="112" x2="190" y2="192" stroke="#FF6EC7"/>
      <line x1="190" y1="192" x2="310" y2="272" stroke="#84CC16"/>
      <line x1="310" y1="192" x2="190" y2="272" stroke="#A855F7"/>
      <line x1="190" y1="272" x2="310" y2="352" stroke="#22D3EE"/>
      <line x1="310" y1="272" x2="190" y2="352" stroke="#F59E0B"/>
      <line x1="190" y1="352" x2="310" y2="432" stroke="#FF6EC7"/>
      <line x1="310" y1="352" x2="190" y2="432" stroke="#84CC16"/>
    </g>

    <!-- Block t -->
    <g transform="translate(231, 112)" filter="url(#g)">
      <rect x="-75" y="-34" width="150" height="68" rx="8" fill="rgba(34,211,238,0.08)" stroke="url(#bt)" stroke-width="2.5"/>
      <text x="0" y="12" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-weight="800" font-size="40" fill="#22D3EE">t</text>
    </g>

    <!-- Block m -->
    <g transform="translate(276, 192)" filter="url(#g)">
      <rect x="-75" y="-34" width="150" height="68" rx="8" fill="rgba(168,85,247,0.08)" stroke="url(#bm)" stroke-width="2.5"/>
      <text x="0" y="12" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-weight="800" font-size="40" fill="#A855F7">m</text>
    </g>

    <!-- Block e (hub) -->
    <g transform="translate(256, 272)" filter="url(#g)">
      <rect x="-82" y="-38" width="164" height="76" rx="10" fill="rgba(255,110,199,0.1)" stroke="url(#be)" stroke-width="3"/>
      <text x="0" y="14" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-weight="800" font-size="46" fill="#FF6EC7">e</text>
    </g>

    <!-- Block s -->
    <g transform="translate(236, 352)" filter="url(#g)">
      <rect x="-75" y="-34" width="150" height="68" rx="8" fill="rgba(132,204,22,0.08)" stroke="url(#bs)" stroke-width="2.5"/>
      <text x="0" y="12" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-weight="800" font-size="40" fill="#84CC16">s</text>
    </g>

    <!-- Block h -->
    <g transform="translate(271, 432)" filter="url(#g)">
      <rect x="-75" y="-34" width="150" height="68" rx="8" fill="rgba(245,158,11,0.08)" stroke="url(#bh)" stroke-width="2.5"/>
      <text x="0" y="12" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace" font-weight="800" font-size="40" fill="#F59E0B">h</text>
    </g>

    <!-- Signal pulses -->
    <circle cx="250" cy="150" r="3.5" fill="#22D3EE">
      <animate attributeName="cy" values="140;180;140" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="230" r="3" fill="#A855F7">
      <animate attributeName="cy" values="220;260;220" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="310" r="3" fill="#FF6EC7">
      <animate attributeName="cy" values="300;340;300" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;0.2;0.85" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="390" r="3" fill="#84CC16">
      <animate attributeName="cy" values="380;420;380" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.25;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
